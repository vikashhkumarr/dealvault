<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Auth — DealVault</title>
  <link rel="stylesheet" href="/css/style.css" />
</head>
<body>
<header class="header"><div class="container nav"><a class="logo" href="/">Deal<span>Vault</span></a></div></header>
<main class="container layout">
  <section class="panel" style="max-width:480px; margin:0 auto">
    <h1>Login / Signup</h1>
    <p id="sessionState" class="small" style="margin:8px 0 12px"></p>
    <div class="form-grid">
      <input class="input" id="email" type="email" placeholder="Email" />
      <input class="input" id="password" type="password" placeholder="Password" />
      <div class="actions">
        <button class="btn btn-primary" onclick="login()">Login</button>
        <button class="btn" onclick="signup()">Signup</button>
        <button class="btn btn-outline" onclick="resetPassword()">Reset Password</button>
        <button class="btn btn-outline" onclick="logout()">Logout</button>
      </div>
      <p id="authStatus" class="copy-feedback"></p>
    </div>
  </section>
</main>
<script type="module" src="/js/auth.js"></script>
</body>
</html>
