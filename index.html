<!DOCTYPE html>

<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>DealVault</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Inter, Arial;
}

body{
background:linear-gradient(120deg,#020617,#0f172a,#020617);
color:white;
padding:40px;
}

/* NAVBAR */

.navbar{
display:flex;
justify-content:space-between;
align-items:center;
margin-bottom:80px;
}

.logo{
font-size:24px;
font-weight:bold;
}

.nav-links{
display:flex;
gap:30px;
color:#94a3b8;
}

/* HERO */

.hero{
text-align:center;
margin-bottom:80px;
}

.hero h1{
font-size:60px;
font-weight:bold;
margin-bottom:20px;
}

.hero span{
color:#8b5cf6;
}

.hero p{
color:#94a3b8;
font-size:18px;
margin-bottom:30px;
}

.hero-buttons{
display:flex;
justify-content:center;
gap:20px;
}

.btn{
padding:14px 28px;
border-radius:10px;
border:none;
font-weight:bold;
cursor:pointer;
}

.btn-primary{
background:#6366f1;
color:white;
}

.btn-secondary{
background:#1e293b;
color:white;
}

/* BENTO GRID */

.bento{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
gap:20px;
margin-bottom:80px;
}

.bento-card{
background:#1e293b;
border-radius:16px;
padding:30px;
min-height:150px;
box-shadow:0 10px 30px rgba(0,0,0,0.5);
}

/* DEALS */

#deals{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(280px,1fr));
gap:20px;
}

.deal-card{
background:#1e293b;
padding:25px;
border-radius:14px;
transition:0.3s;
}

.deal-card:hover{
transform:translateY(-5px);
}

.deal-title{
font-size:20px;
font-weight:bold;
margin-bottom:6px;
}

.deal-brand{
color:#94a3b8;
margin-bottom:15px;
}

button{
background:#8b5cf6;
border:none;
padding:10px 18px;
border-radius:8px;
color:white;
cursor:pointer;
}

/* FOOTER */

.footer{
margin-top:80px;
text-align:center;
color:#94a3b8;
}

</style>

</head>

<body>

<div class="navbar">

<div class="logo">🔥 DealVault</div>

<div class="nav-links">
Home
Browse Deals
Submit Deal
</div>

</div>

<div class="hero">

<h1>Never pay <span>full price</span> again.</h1>

<p>
Discover discount codes, referral links, and deals shared by the community.
</p>

<div class="hero-buttons">

<button class="btn btn-primary">Browse Deals</button>

<button class="btn btn-secondary">Submit Deal</button>

</div>

</div>

<div class="bento">

<div class="bento-card">🔥 Trending Deals</div>

<div class="bento-card">💰 High Value Coupons</div>

<div class="bento-card">🎁 Referral Bonuses</div>

<div class="bento-card">⏳ Expiring Soon</div>

</div>

<h2 style="margin-bottom:20px;">All Deals</h2>

<div id="deals"></div>

<div class="footer">

© 2026 DealVault

</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";

import { getFirestore, collection, getDocs } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";


const firebaseConfig = {

apiKey: "AIzaSyC48oL4RCxONkat4DTKVjparBkbJgdHJpo",
authDomain: "coupon-app-39c05.firebaseapp.com",
projectId: "coupon-app-39c05",
storageBucket: "coupon-app-39c05.firebasestorage.app",
messagingSenderId: "1021067457486",
appId: "1:1021067457486:web:63bab0b651c77f5184719f"

};

const app = initializeApp(firebaseConfig);

const db = getFirestore(app);

const dealsContainer = document.getElementById("deals");


async function loadDeals(){

const snapshot = await getDocs(collection(db,"deals"));

snapshot.forEach((doc)=>{

const deal = doc.data();

const card = `

<div class="deal-card">

<div class="deal-title">${deal.title}</div>

<div class="deal-brand">${deal.brand}</div>

<button onclick="window.open('${deal.referral}')">

Get Deal

</button>

</div>

`;

dealsContainer.innerHTML += card;

});

}

loadDeals();

</script>

</body>

</html>
