<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>DealVault</title>
  <style>
    :root {
      --bg: #050816;
      --panel: #0f172a;
      --panel-2: #111c34;
      --border: #1e293b;
      --text: #e2e8f0;
      --muted: #94a3b8;
      --brand: #6366f1;
      --brand-2: #8b5cf6;
      --success: #22c55e;
    }

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: Inter, Arial, sans-serif;
    }

    body {
      min-height: 100vh;
      background:
        radial-gradient(circle at 10% 10%, rgba(99, 102, 241, 0.22), transparent 30%),
        radial-gradient(circle at 90% 0%, rgba(139, 92, 246, 0.15), transparent 28%),
        var(--bg);
      color: var(--text);
    }

    .container {
      width: min(1400px, 96vw);
      margin: 0 auto;
    }

    .header {
      padding: 24px 0;
      border-bottom: 1px solid var(--border);
      backdrop-filter: blur(8px);
    }

    .header .container {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 16px;
    }

    .logo {
      font-size: 24px;
      font-weight: 800;
      letter-spacing: -0.03em;
    }

    .logo span { color: var(--brand); }

    .header-cta {
      border: 1px solid #312e81;
      background: linear-gradient(120deg, var(--brand), var(--brand-2));
      color: #fff;
      border-radius: 10px;
      padding: 10px 14px;
      font-weight: 600;
      cursor: pointer;
    }

    .hero {
      padding: 82px 0 38px;
      text-align: center;
    }

    .hero h1 {
      font-size: clamp(2.1rem, 5.6vw, 4rem);
      font-weight: 800;
      letter-spacing: -0.04em;
      margin-bottom: 16px;
      line-height: 1.08;
    }

    .hero h1 span {
      background: linear-gradient(90deg, #818cf8, #c084fc);
      -webkit-background-clip: text;
      background-clip: text;
      color: transparent;
    }

    .hero p {
      max-width: 720px;
      margin: 0 auto;
      color: var(--muted);
      font-size: clamp(1rem, 1.4vw, 1.15rem);
      line-height: 1.7;
    }

    .section {
      padding: 24px 0 56px;
    }

    .section-header {
      display: flex;
      align-items: flex-end;
      justify-content: space-between;
      gap: 12px;
      margin-bottom: 22px;
    }

    .section-header h2 {
      font-size: clamp(1.4rem, 3vw, 2rem);
      line-height: 1;
    }

    .section-header p {
      color: var(--muted);
      margin-top: 8px;
      font-size: 0.95rem;
    }

    .section-header .view-all {
      color: #93c5fd;
      font-weight: 600;
      text-decoration: none;
      white-space: nowrap;
    }

    .deals {
      display: grid;
      gap: 18px;
      grid-template-columns: repeat(12, minmax(0, 1fr));
      align-items: stretch;
      grid-auto-rows: minmax(210px, auto);
    }

    .card {
      grid-column: span 4;
      background: linear-gradient(160deg, rgba(17, 28, 52, 0.95), rgba(15, 23, 42, 0.96));
      border: 1px solid var(--border);
      border-radius: 18px;
      padding: 20px;
      min-height: 210px;
      display: flex;
      flex-direction: column;
      gap: 10px;
      position: relative;
      overflow: hidden;
      box-shadow: 0 16px 40px rgba(2, 6, 23, 0.45);
    }

    .card::before {
      content: "";
      position: absolute;
      width: 180px;
      height: 180px;
      right: -70px;
      top: -70px;
      border-radius: 999px;
      background: radial-gradient(circle at center, rgba(99, 102, 241, 0.22), transparent 60%);
      pointer-events: none;
    }

    .card.featured {
      grid-column: span 8;
      min-height: 250px;
      border-color: #312e81;
      background:
        radial-gradient(circle at 85% 10%, rgba(129, 140, 248, 0.24), transparent 35%),
        linear-gradient(170deg, rgba(20, 31, 60, 0.98), rgba(15, 23, 42, 0.96));
    }

    .card.wide {
      grid-column: span 6;
    }

    .card.tall {
      grid-column: span 4;
      grid-row: span 2;
      min-height: 438px;
    }

    .tag {
      display: inline-flex;
      width: fit-content;
      border: 1px solid #334155;
      background: rgba(15, 23, 42, 0.65);
      color: #cbd5e1;
      border-radius: 999px;
      font-size: 12px;
      padding: 5px 10px;
      font-weight: 600;
    }

    .title {
      font-size: 1.14rem;
      font-weight: 700;
      letter-spacing: -0.01em;
      line-height: 1.3;
    }

    .brand {
      color: #a5b4fc;
      font-size: 0.95rem;
      font-weight: 500;
    }

    .discount {
      font-size: clamp(1.8rem, 4vw, 2.35rem);
      font-weight: 800;
      letter-spacing: -0.03em;
      color: #eef2ff;
      margin-top: 4px;
    }

    .expire {
      color: var(--muted);
      font-size: 0.9rem;
      margin-top: auto;
    }

    .actions {
      margin-top: 10px;
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
    }

    .btn {
      border: none;
      border-radius: 10px;
      padding: 10px 14px;
      cursor: pointer;
      font-weight: 700;
      color: #fff;
    }

    .copy {
      background: linear-gradient(120deg, var(--brand), var(--brand-2));
    }

    .get {
      background: #1f2937;
      border: 1px solid #334155;
    }

    .copied {
      color: var(--success);
      font-size: 0.85rem;
      margin-top: 6px;
      font-weight: 600;
      min-height: 1rem;
    }

    @media (max-width: 1000px) {
      .card,
      .card.featured,
      .card.wide,
      .card.tall {
        grid-column: span 6;
        grid-row: auto;
        min-height: 220px;
      }
    }

    @media (max-width: 700px) {
      .header .container { flex-wrap: wrap; }
      .hero { padding-top: 56px; }
      .deals { grid-template-columns: 1fr; }
      .card,
      .card.featured,
      .card.wide,
      .card.tall {
        grid-column: auto;
        min-height: 190px;
      }
      .section-header { align-items: flex-start; flex-direction: column; }
    }
  </style>
</head>
<body>
  <header class="header">
    <div class="container">
      <div class="logo">Deal<span>Vault</span></div>
      <button class="header-cta">Submit a Deal</button>
    </div>
  </header>

  <section class="hero container">
    <h1>Never pay <span>full price</span> again.</h1>
    <p>Discover premium discount codes and referral deals shared by the community.</p>
  </section>

  <section class="section container">
    <div class="section-header">
      <div>
        <h2>Trending Deals</h2>
        <p>Fresh, high-converting offers across apps, fashion, productivity, and creator tools.</p>
      </div>
      <a class="view-all" href="#">View All →</a>
    </div>

    <div id="deals" class="deals"></div>
  </section>

  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
    import { getFirestore, collection, getDocs } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

    const firebaseConfig = {
      apiKey: "AIzaSyC48oL4RCxONkat4DTKVjparBkbJgdHJpo",
      authDomain: "coupon-app-39c05.firebaseapp.com",
      projectId: "coupon-app-39c05",
      storageBucket: "coupon-app-39c05.firebasestorage.app",
      messagingSenderId: "1021067457486",
      appId: "1:1021067457486:web:63bab0b651c77f5184719f"
    };

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);
    const dealsContainer = document.getElementById("deals");

    async function loadDeals() {
      const snapshot = await getDocs(collection(db, "deals"));
      let index = 0;

      snapshot.forEach((doc) => {
        const deal = doc.data();
        const isFeatured = index % 5 === 0;
        const isWide = index % 5 === 2;
        const isTall = index % 5 === 4;
        const safeCoupon = (deal.coupon || "").replace(/'/g, "\\'");
        const safeDiscount = deal.discount || "Deal Inside";
        const safeExpire = deal.expire || "Limited-time offer";

        const card = `
          <article class="card ${isFeatured ? "featured" : ""} ${!isFeatured && isWide ? "wide" : ""} ${!isFeatured && isTall ? "tall" : ""}">
            <span class="tag">${isFeatured ? "🔥 Featured" : "Community pick"}</span>
            <div class="title">${deal.title}</div>
            <div class="brand">${deal.brand}</div>
            <div class="discount">${safeDiscount}</div>
            <div class="expire">${safeExpire}</div>
            <div class="actions">
              <button class="btn copy" onclick="copyCode('${safeCoupon}', this)">Copy Code</button>
              <button class="btn get">Get Deal</button>
            </div>
            <div class="copied"></div>
          </article>
        `;

        dealsContainer.innerHTML += card;
        index += 1;
      });
    }

    window.copyCode = async (coupon, button) => {
      if (!coupon) return;

      await navigator.clipboard.writeText(coupon);
      const feedback = button.closest(".card")?.querySelector(".copied");

      if (feedback) {
        feedback.textContent = `Copied: ${coupon}`;
        setTimeout(() => {
          feedback.textContent = "";
        }, 1500);
      }
    };

    loadDeals();
  </script>
</body>
</html>
