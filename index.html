<!DOCTYPE html>

<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>DealVault</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Inter, Arial;
}

body{
background:#050816;
color:white;
}

/* HEADER */

.header{
padding:25px 60px;
border-bottom:1px solid #1e293b;
}

.logo{
font-size:20px;
font-weight:600;
}

/* HERO */

.hero{
text-align:center;
padding:120px 20px;
background:radial-gradient(circle at center,#0f172a,#020617);
}

.hero h1{
font-size:64px;
font-weight:800;
margin-bottom:20px;
}

.hero span{
color:#6366f1;
}

.hero p{
max-width:650px;
margin:auto;
color:#9ca3af;
font-size:18px;
line-height:1.6;
}

/* SECTION */

.section{
padding:80px 60px;
}

.section-header{
display:flex;
justify-content:space-between;
margin-bottom:30px;
}

.section-header h2{
font-size:32px;
}

.section-header span{
color:#60a5fa;
}

/* DEAL GRID */

.deals{
display:grid;
grid-template-columns:repeat(2,1fr);
gap:25px;
}

/* DEAL CARD STRUCTURE */

.card{
background:#0f172a;
border:1px solid #1e293b;
border-radius:16px;
padding:30px;
position:relative;
min-height:140px;
}

.card.large{
grid-column:span 2;
}

.discount{
color:#6366f1;
font-size:36px;
margin-top:10px;
font-weight:bold;
}

.copy{
position:absolute;
bottom:20px;
right:20px;
background:#6366f1;
border:none;
padding:10px 16px;
border-radius:8px;
color:white;
cursor:pointer;
}

.get{
position:absolute;
bottom:20px;
right:20px;
background:#1f2937;
border:none;
padding:10px 16px;
border-radius:8px;
color:white;
cursor:pointer;
}

/* RESPONSIVE */

@media(max-width:900px){

.hero h1{
font-size:42px;
}

.deals{
grid-template-columns:1fr;
}

}

</style>

</head>

<body>

<!-- HEADER -->

<div class="header">

<div class="logo">DealVault</div>

</div>

<!-- HERO -->

<div class="hero">

<h1>Never pay <span>full price</span> again.</h1>

<p>
Discover discount codes, referral links, and exclusive deals shared by the community.
</p>

</div>

<!-- TRENDING DEALS -->

<div class="section">

<div class="section-header">

<h2>Trending Deals</h2>

<span>View All →</span>

</div>

<!-- FIREBASE DEALS WILL LOAD HERE -->

<div id="deals" class="deals">

</div>

</div>

</body>
</html>
